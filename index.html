<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Doer — Interactive Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0D0D;
    --cream: #F0EBE1;
    --gold: #D4A843;
    --card: #1A1A1A;
    --card2: #161616;
    --border: #2A2A2A;
    --body: #C5BFB2;
    --muted: #8A8376;
    --cr-red: #D32011;
    --rea-col: #F97316;
    --nnpc-col: #16A34A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Cabinet Grotesk', 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Progress bar at very top */
  #progress-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: #1A1A1A;
    z-index: 200;
  }

  #progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.3s ease;
  }

  /* Hint at bottom */
  #tap-hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    z-index: 200;
    animation: fade-pulse 2s infinite;
    white-space: nowrap;
  }

  @keyframes fade-pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }

  /* Main content area */
  #screen {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* Scrollable inner */
  .scroll-body {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 60px;
  }

  .scroll-body::-webkit-scrollbar { display: none; }

  /* ===== GLOBAL COMPONENTS ===== */

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 6px;
    font-size: 12px;
    font-weight: 700;
    color: var(--cream);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(13,13,13,0.97);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 10px 0 18px;
    z-index: 50;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
    gap: 3px;
  }

  .nav-item.active { color: var(--gold); }
  .nav-item .icon { font-size: 20px; }

  .cta-btn {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 2px;
    cursor: pointer;
    animation: pulse-glow 2s infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .cta-btn .arr { animation: nudge 1.2s infinite; display: inline-block; }

  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 0 0 rgba(212,168,67,0.7), 0 0 20px rgba(212,168,67,0.25); }
    50% { box-shadow: 0 0 0 10px rgba(212,168,67,0), 0 0 30px rgba(212,168,67,0.5); }
  }

  @keyframes nudge {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(5px); }
  }

  .screen-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 20px 10px;
    background: var(--bg);
  }

  .back-btn {
    font-size: 22px;
    color: var(--cream);
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
  }

  .screen-title { font-size: 15px; font-weight: 600; color: var(--cream); }

  .section-pad { padding: 0 20px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 10px;
  }

  .lbl {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .stat-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .stat-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 6px;
    text-align: center;
  }

  .stat-block .icon { font-size: 18px; margin-bottom: 4px; }
  .stat-block .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--cream);
    line-height: 1;
  }
  .stat-block .slbl { font-size: 9px; letter-spacing: 1px; color: var(--muted); margin-top: 3px; }

  .detail-list { background: var(--card); border: 1px solid var(--border); border-radius: 14px; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .dl { color: var(--muted); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .detail-row .dr { color: var(--cream); font-weight: 600; text-align: right; }

  /* ===== PHASE CARD ===== */
  .phase-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
  }

  .phase-screen .photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    opacity: 0.12;
  }

  .phase-screen .gold-line {
    width: 50px; height: 2px;
    background: var(--gold);
    margin: 0 auto 28px;
    position: relative; z-index: 2;
  }

  .phase-screen .gold-line.bot { margin: 28px auto 0; }

  .phase-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1.05;
    color: var(--cream);
    max-width: 340px;
    position: relative; z-index: 2;
  }

  .phase-screen .tap-label {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    animation: fade-pulse 2s infinite;
    z-index: 2;
    white-space: nowrap;
  }

  /* ===== QR SCREEN ===== */
  .qr-full {
    position: fixed;
    inset: 0;
    background: var(--cr-red);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 24px;
    text-align: center;
    overflow-y: auto;
  }

  .qr-full .brand-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 8px;
  }

  .qr-full h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: #fff;
    line-height: 0.95;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .qr-full .combo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 24px;
  }

  .qr-box {
    width: 200px; height: 200px;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-box svg { width: 100%; height: 100%; }

  .qr-code-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    letter-spacing: 8px;
    color: #fff;
    margin-bottom: 14px;
  }

  .qr-instruction {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    line-height: 1.5;
    margin-bottom: 16px;
    max-width: 280px;
  }

  .qr-tags { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .qr-tag {
    background: rgba(0,0,0,0.3);
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    color: #fff;
  }

  .qr-timer {
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 14px;
    padding: 16px 28px;
    text-align: center;
  }

  .qr-timer .tl { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.7); }
  .qr-timer .tv {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: #fff;
    letter-spacing: 3px;
    margin-top: 2px;
  }

  .qr-tap-hint {
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    animation: fade-pulse 2s infinite;
  }

  /* ===== CAPTION CARD ===== */
  .caption-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
    overflow: hidden;
  }

  .caption-screen .photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center 20%;
    opacity: 0.18;
    filter: grayscale(30%);
  }

  .caption-screen .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(13,13,13,0.6) 0%, rgba(13,13,13,0.3) 50%, rgba(13,13,13,0.7) 100%);
  }

  .caption-screen .content { position: relative; z-index: 2; }

  .caption-screen .gold-pill {
    display: inline-block;
    border: 1px solid var(--gold);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 24px;
  }

  .caption-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 46px;
    line-height: 1.0;
    color: var(--cream);
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .caption-screen .sub {
    font-size: 16px;
    color: var(--body);
    line-height: 1.5;
    max-width: 300px;
    margin: 0 auto 40px;
  }

  .caption-screen .tap-lbl {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    animation: fade-pulse 2s infinite;
  }

  /* ===== CHALLENGE PAGE ===== */
  .challenge-hero {
    background: linear-gradient(150deg, #D32011 0%, #7A100A 100%);
    padding: 30px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .challenge-hero::before {
    content: '';
    position: absolute;
    top: -40%; right: -20%;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  }

  .challenge-hero .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .challenge-hero .emoji { font-size: 48px; margin-bottom: 12px; display: block; }

  .challenge-hero .tagline {
    font-size: 14px;
    color: rgba(255,255,255,0.92);
    line-height: 1.4;
    max-width: 260px;
    margin: 0 auto;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .meta-row .ml { color: var(--muted); }
  .meta-row .mr { color: var(--cream); font-weight: 600; }

  /* ===== JOIN SCREEN ===== */
  .join-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 30px 20px 20px;
  }

  .join-check {
    width: 74px; height: 74px;
    border-radius: 50%;
    background: rgba(74,222,128,0.15);
    border: 2px solid #4ADE80;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    margin-bottom: 18px;
  }

  .join-wrap h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 1px;
    color: var(--cream);
    margin-bottom: 10px;
  }

  .join-wrap .sub {
    font-size: 14px;
    color: var(--body);
    line-height: 1.55;
    max-width: 290px;
    margin-bottom: 24px;
  }

  /* ===== LEADERBOARD ===== */
  .lb-hero {
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 14px 16px;
    text-align: center;
    margin-bottom: 12px;
  }

  .lb-hero .lt {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--gold);
  }

  .lb-hero .ls { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .tab-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tab {
    flex: 1;
    padding: 8px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .tab.active {
    background: rgba(212,168,67,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }

  .lb-list {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
  }

  .lb-row {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .lb-row:last-child { border-bottom: none; }

  .lb-row.you {
    background: rgba(212,168,67,0.08);
    border-radius: 8px;
  }

  .lb-rank {
    width: 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    color: var(--gold);
    text-align: center;
    flex-shrink: 0;
  }

  .lb-av {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #444;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    color: var(--cream);
    flex-shrink: 0;
  }

  .lb-av.gold { background: var(--gold); color: var(--bg); }
  .lb-av.silver { background: #A0A0A0; color: var(--bg); }
  .lb-av.bronze { background: #B8733D; color: var(--bg); }

  .lb-name { flex: 1; font-size: 13px; color: var(--cream); }
  .lb-name .you-tag { font-size: 9px; color: var(--gold); margin-left: 4px; letter-spacing: 1px; }

  .lb-steps {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--cream);
    letter-spacing: 1px;
  }

  .lb-steps .sub { font-size: 9px; color: var(--muted); display: block; letter-spacing: 0; }

  /* ===== COMPLETION ===== */
  .completion-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 24px 20px 20px;
  }

  .trophy-anim {
    font-size: 64px;
    margin-bottom: 10px;
    animation: float-trophy 2s ease-in-out infinite;
  }

  @keyframes float-trophy {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .completion-wrap .clbl {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .completion-wrap h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    color: var(--cream);
    line-height: 1;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .completion-wrap .cnote {
    font-size: 14px;
    color: var(--body);
    line-height: 1.5;
    max-width: 290px;
    margin-bottom: 24px;
  }

  .comp-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    margin-bottom: 24px;
  }

  .comp-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
  }

  .comp-block .cn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--cream);
    line-height: 1;
  }

  .comp-block .cl {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 5px;
  }

  /* ===== REWARDS LIST ===== */
  .rewards-header {
    padding: 16px 20px 10px;
  }

  .rewards-header h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--cream);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .rewards-header .rsub { font-size: 12px; color: var(--muted); }

  .reward-card-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin: 0 20px 10px;
    position: relative;
  }

  .reward-card-item.unlocked {
    border-color: var(--gold);
    box-shadow: 0 0 0 0 rgba(212,168,67,0.5);
    animation: pulse-glow 2s infinite;
  }

  .reward-icon {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .reward-info { flex: 1; min-width: 0; }
  .reward-info .brand { font-size: 11px; letter-spacing: 1px; color: var(--muted); font-weight: 700; }
  .reward-info .rname { font-size: 14px; font-weight: 700; color: var(--cream); margin-top: 2px; }
  .reward-info .rtag { font-size: 11px; color: var(--gold); margin-top: 4px; }

  .reward-action {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--gold);
    flex-shrink: 0;
  }

  .reward-locked .reward-info .rname { color: var(--muted); }
  .reward-locked .lock { font-size: 18px; flex-shrink: 0; }

  .coming-soon-badge {
    position: absolute;
    top: -6px; right: 12px;
    background: var(--card2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 700;
  }

  /* ===== REWARD DETAIL ===== */
  .reward-detail-hero {
    background: linear-gradient(150deg, var(--cr-red) 0%, #7A100A 100%);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .reward-detail-hero::before {
    content: '';
    position: absolute;
    top: -30%; right: -10%;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  }

  .reward-detail-hero .bp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 8px;
  }

  .reward-detail-hero .rn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: #fff;
    line-height: 0.95;
    letter-spacing: 1px;
  }

  .warning-box {
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .warning-box .wi { font-size: 20px; flex-shrink: 0; }
  .warning-box .wt { font-size: 12px; color: var(--body); line-height: 1.55; }
  .warning-box .wt strong { color: var(--gold); }

  /* ===== BATTLE SCREEN ===== */
  .battle-sponsor-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }

  .battle-sponsor-bar .slbl { font-size: 10px; letter-spacing: 1px; color: var(--muted); }
  .battle-sponsor-bar .sname { font-size: 12px; font-weight: 700; color: var(--cream); }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #4ADE80;

const SCREENS = [
  { id: 'qr', type: 'qr' },
  { id: 'caption', type: 'caption' },
  { id: 'challenge', type: 'app', nav: 'challenges' },
  { id: 'join', type: 'app', nav: 'challenges' },
  { id: 'tracking', type: 'app', nav: 'challenges' },
  { id: 'leaderboard', type: 'app', nav: 'challenges' },
  { id: 'completion', type: 'app', nav: 'challenges' },
  { id: 'rewards', type: 'app', nav: 'challenges' },
  { id: 'reward_detail', type: 'app', nav: 'challenges' },
  { id: 'phase1', type: 'phase', text: 'The same loop scales to teams, companies, and cities.' },
  { id: 'battle', type: 'app', nav: 'groups' },
  { id: 'allbattles', type: 'app', nav: 'groups' },
  { id: 'cta', type: 'cta' }
];

let idx = 0;
let _activeTimerInt = null;
let _activeStepInt = null;
function _clearTrackingIntervals() {
  if (_activeTimerInt) { clearInterval(_activeTimerInt); _activeTimerInt = null; }
  if (_activeStepInt) { clearInterval(_activeStepInt); _activeStepInt = null; }
}

function updateProgress() {
  const pct = ((idx + 1) / SCREENS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function render() {
  _clearTrackingIntervals();
  updateProgress();
  const s = SCREENS[idx];
  const screen = document.getElementById('screen');
  const hint = document.getElementById('tap-hint');

  hint.style.display = ['qr', 'cta'].includes(s.id) ? 'none' : 'block';

  if (s.type === 'qr') screen.innerHTML = renderQR();
  else if (s.type === 'caption') screen.innerHTML = renderCaption();
  else if (s.type === 'phase') screen.innerHTML = renderPhase(s.text);
  else if (s.type === 'cta') screen.innerHTML = renderCTA();
  else if (s.type === 'app') {
    screen.innerHTML = renderApp(s.id, s.nav);
  }

  const replay = document.getElementById('replayBtn');
  if (replay) {
    replay.addEventListener('click', e => { e.stopPropagation(); idx = 0; render(); });
  }

  // Tracking screen: wire up START and Fast Forward buttons
  if (s.id === 'tracking') {
    var timerRunning = false;
    var timerSecs = 0;
    var timerInt = null;
    var stepInt = null;
    var currentSteps = 0;
    var TARGET_STEPS = 54521;
    var STEP_INCREMENT = 3; // steps per tick at ~800ms = realistic walking cadence display

    var startBtn = document.getElementById('startTrackingBtn');
    var startBtnLabel = document.getElementById('startBtnLabel');
    var startBtnIcon = document.getElementById('startBtnIcon');

    if (startBtn) {
      startBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (timerRunning) {
          // Pause
          timerRunning = false;
          clearInterval(timerInt);
          clearInterval(stepInt);
          startBtnIcon.textContent = '▶';
          startBtnLabel.textContent = 'RESUME';
        } else {
          // Start or resume
          timerRunning = true;
          startBtnIcon.textContent = '⏸';
          startBtnLabel.textContent = 'PAUSE';

          timerInt = setInterval(function() {
            timerSecs++;
            var h = Math.floor(timerSecs / 3600);
            var m = Math.floor((timerSecs % 3600) / 60);
            var sc = timerSecs % 60;
            var d = document.getElementById('timer-display');
            if (d) d.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sc).padStart(2,'0');
          }, 1000);

          _activeStepInt = stepInt = setInterval(function() {
            if (currentSteps >= TARGET_STEPS) {
              clearInterval(stepInt);
              return;
            }
            currentSteps = Math.min(currentSteps + STEP_INCREMENT + Math.floor(Math.random() * 3), TARGET_STEPS);
            var sd = document.getElementById('step-display');
            if (sd) sd.textContent = currentSteps.toLocaleString();
            var spd = document.getElementById('speed-display');
            var speeds = ['3.2','3.5','3.8','4.1','4.4','3.9','4.2','3.6'];
            if (spd) spd.textContent = speeds[Math.floor(Math.random() * speeds.length)];
          }, 800);
        }
      });

      // Auto-start after a short delay so the screen feels alive
      setTimeout(function() {
        if (!timerRunning && document.getElementById('startTrackingBtn')) {
          startBtn.click();
        }
      }, 600);
    }

    var ffBtn = document.getElementById('fastForwardBtn');
    if (ffBtn) {
      ffBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        clearInterval(timerInt);
        clearInterval(stepInt);
        next();
      });
    }
  }
}

function next() { if (idx < SCREENS.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }

document.addEventListener('click', e => { if (!e.target.closest('#replayBtn')) next(); });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  if (e.key === 'r' || e.key === 'R') { idx = 0; render(); }
});

  const items = [
    { id: 'home', icon: '🏠', label: 'Home' },
    { id: 'groups', icon: '👥', label: 'Groups' },
    { id: 'tracking', icon: '📊', label: 'Tracking' },
    { id: 'challenges', icon: '🏁', label: 'Challenges' },
    { id: 'profile', icon: '👤', label: 'Profile' }
  ];
  return `<div class="bottom-nav">${items.map(i => `
    <div class="nav-item ${i.id === active ? 'active' : ''}">
      <div class="icon">${i.icon}</div>${i.label}
    </div>`).join('')}</div>`;
}
